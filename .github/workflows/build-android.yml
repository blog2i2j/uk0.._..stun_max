name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0"

      - name: Install gogio
        run: go install gioui.org/cmd/gogio@latest

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version || 'dev' }}" >> $GITHUB_OUTPUT
          fi

      - name: Build Android APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/26.1.10909125
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p build

          gogio \
            -target android \
            -appid com.stunmax.app \
            -version "${VERSION}" \
            -minsdk 24 \
            -o "build/stun_max-android-${VERSION}.apk" \
            ./client/

          ls -lh build/stun_max-android-*.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stun-max-android-apk
          path: build/stun_max-android-*.apk
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/stun_max-android-*.apk
          draft: false
          prerelease: false
